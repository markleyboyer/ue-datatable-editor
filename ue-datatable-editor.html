<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UE DataTable Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-alpine-dark.css">
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Toolbar ── */
#toolbar { background: #16213e; padding: 7px 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
.btn { background: #0f3460; color: #e0e0e0; border: 1px solid #2a4a80; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.btn:hover { background: #1a5a9e; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.green  { background: #1a4a30; border-color: #2d7a50; }
.btn.green:hover { background: #226040; }
.btn.purple { background: #3a2060; border-color: #6a4aaa; }
.btn.purple:hover { background: #4a2a80; }
.tsep { width: 1px; height: 20px; background: #2a3a60; margin: 0 2px; flex-shrink: 0; }
#file-name   { color: #7a9abf; font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }
#table-badge { background: #0a1a30; border: 1px solid #2a4a80; padding: 2px 10px; border-radius: 10px; font-size: 11px; color: #8aaad0; }
#status-msg  { color: #7a9abf; font-size: 11px; margin-left: auto; white-space: nowrap; }

/* ── Selection bar  (sits between toolbar and grid) ── */
#sel-bar {
  background: #0d1e38; border-bottom: 2px solid #2a5aaa;
  padding: 5px 12px; display: none; align-items: center; gap: 8px;
  font-size: 12px; flex-shrink: 0;
}
#sel-bar.on { display: flex; }
#sel-info { color: #90b8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
#sel-val {
  background: #06101e; color: #e0e0e0; border: 1px solid #3a6aaa;
  padding: 4px 9px; border-radius: 3px; font-size: 12px; width: 160px;
}
#sel-val:focus { outline: none; border-color: #5a9ae0; box-shadow: 0 0 0 2px rgba(90,154,224,0.2); }
#sel-val:disabled { opacity: 0.35; }
#sel-hint { color: #3a5a80; font-size: 11px; white-space: nowrap; }
/* Range (min/max) inputs — swapped in for range-type fields */
#sel-range { display: none; align-items: center; gap: 6px; }
#sel-range.on { display: flex; }
#sel-range label { color: #8aaad0; font-size: 11px; }
#sel-min, #sel-max { background: #06101e; color: #e0e0e0; border: 1px solid #3a6aaa; padding: 4px 7px; border-radius: 3px; font-size: 12px; width: 76px; }
#sel-min:focus, #sel-max:focus { outline: none; border-color: #5a9ae0; box-shadow: 0 0 0 2px rgba(90,154,224,0.2); }

/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }
#grid-wrap { flex: 1; overflow: hidden; }
#grid { width: 100%; height: 100%; }

/* ── File panel ── */
#file-panel { width: 210px; background: #0d1627; border-right: 1px solid #0f3460; display: none; flex-direction: column; overflow: hidden; flex-shrink: 0; }
#fp-header { padding: 7px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; flex-shrink: 0; background: #10182e; }
#fp-header span { font-size: 11px; color: #8aaad0; text-transform: uppercase; letter-spacing: 0.5px; }
#fp-body { overflow-y: auto; flex: 1; padding: 4px 0; }
.fp-section-head { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px 3px; }
.fp-entry { display: flex; align-items: center; padding: 5px 8px; cursor: pointer; border-radius: 3px; margin: 1px 4px; gap: 4px; }
.fp-entry:hover { background: #1a2a45; }
.fp-active { background: #1e3560; }
.fp-active:hover { background: #244070; }
.fp-name { flex: 1; font-size: 11px; color: #c0d8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.fp-dirty { color: #fbbf24 !important; }
.fp-ren-btn { background: none; border: none; color: #5a7a9a; cursor: pointer; font-size: 11px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.fp-ren-btn:hover { color: #90b8e8; }
.fp-dup-btn { background: none; border: none; color: #5a7a9a; cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.fp-dup-btn:hover { color: #90b8e8; }
.fp-close-btn { background: none; border: none; color: #4a3a3a; cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.fp-close-btn:hover { color: #cc5555; }
.fp-ref { display: flex; align-items: center; gap: 5px; padding: 2px 8px 2px 22px; font-size: 10px; border-radius: 3px; margin: 0 4px; }
.fp-ref-loaded { color: #7ec8f8; cursor: pointer; }
.fp-ref-loaded:hover { background: #1a2a45; }
.fp-ref-missing { color: #3a5a70; cursor: default; }
.fp-ref-arrow { color: #2a4a60; flex-shrink: 0; }
.fp-in-grid { background: #152235 !important; }
.fp-in-grid:hover { background: #1e3a5a !important; }
.fp-swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Multi-file grid label rows ── */
.grid-file-label-row { background: #060d1a !important; pointer-events: none; }
.grid-file-label-row .ag-cell { border: none !important; }
.grid-label-row-cell { padding: 0 10px; color: #3a5a80; font-size: 10px; font-style: italic; display: flex; align-items: center; gap: 6px; height: 100%; border-top: 1px solid #122040; }

/* ── Inline mesh variant rows ── */
.variant-expand-btn { background:none; border:none; color:#3a6aaa; cursor:pointer; padding:0 3px; font-size:10px; line-height:1; opacity:0.7; flex-shrink:0; }
.variant-expand-btn:hover { color:#7EC8F8; opacity:1; }
.variant-inline-wrap { width:100%; height:100%; background:#050d1a; display:flex; flex-direction:column; padding:0 8px 4px 28px; box-sizing:border-box; border-bottom:2px solid #0e2040; }
.variant-inline-footer { display:flex; gap:6px; padding:4px 4px 0; }

/* ── Dirty-save confirm ── */
#fp-confirm { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center; }
#fp-confirm-box { background: #16213e; border: 1px solid #3a6aaa; border-radius: 8px; padding: 22px 24px; max-width: 380px; width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
#fp-confirm-box p { color: #c0d8f0; margin: 0 0 18px; font-size: 13px; line-height: 1.5; }
#fp-confirm-box strong { color: #7ec8f8; }
#fp-confirm-btns { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Sidebar ── */
#sidebar { width: 300px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-section { border-bottom: 1px solid #0f3460; }
.sidebar-section h4 { padding: 8px 12px; font-size: 11px; color: #8aaad0; text-transform: uppercase; letter-spacing: 0.5px; background: #10182e; }
.chart-wrap { padding: 10px 12px 4px; }

/* Cell-selection highlights are injected dynamically via a <style> element
   (#sel-hl-css) so AG Grid re-renders can never wipe them. */

/* ── Modal ── */
#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; justify-content: center; align-items: center; }
#modal-bg.on { display: flex; }
#modal { background: #16213e; border: 1px solid #3a5a90; border-radius: 8px; width: 900px; max-width: 96vw; height: 72vh; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
#modal-head { padding: 12px 16px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
#modal-head h3 { font-size: 14px; color: #c0d8f0; }
/* Modal selection bar */
#modal-sel-bar { background: #0d1e38; border-bottom: 1px solid #2a5aaa; padding: 5px 12px; display: none; align-items: center; gap: 8px; font-size: 12px; flex-shrink: 0; }
#modal-sel-bar.on { display: flex; }
#modal-sel-info { color: #90b8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
#modal-sel-val { background: #06101e; color: #e0e0e0; border: 1px solid #3a6aaa; padding: 4px 9px; border-radius: 3px; font-size: 12px; width: 220px; }
#modal-sel-val:focus { outline: none; border-color: #5a9ae0; box-shadow: 0 0 0 2px rgba(90,154,224,0.2); }
#modal-body { flex: 1; overflow: hidden; }
#modal-grid { width: 100%; height: 100%; }
#thumb-popup { display:none; position:fixed; z-index:9999; pointer-events:none;
  background:#0e1828; border:1px solid #3a5a90; border-radius:6px;
  padding:6px; box-shadow:0 4px 20px rgba(0,0,0,0.7); }
#thumb-popup img { display:block; width:400px; height:400px; object-fit:contain; }
#modal-foot { padding: 8px 16px; border-top: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

/* ── AG Grid theme tweaks ── */
.ag-theme-alpine-dark {
  --ag-background-color: #0e1828;
  --ag-odd-row-background-color: #111e30;
  --ag-header-background-color: #0a1422;
  --ag-border-color: #1e3050;
  --ag-row-hover-color: #162038;
}
</style>

<body>

<div id="toolbar">
  <button class="btn" onclick="openFiles()">📂 Open CSV</button>
  <button class="btn green" onclick="saveFile()">💾 Save CSV</button>
  <div class="tsep"></div>
  <button class="btn purple" onclick="openThumbs()">🖼 Thumbnails Folder</button>
  <button class="btn" onclick="addRow()">+ Add Row</button>
  <div class="tsep"></div>
  <span id="table-badge">No file loaded</span>
  <span id="file-name"></span>
  <span id="status-msg"></span>
</div>

<!-- Selection bar: visible when cells are highlighted, lives above the grid -->
<div id="sel-bar">
  <button class="btn" onclick="clearSel()" title="Clear selection (Esc)">✕</button>
  <span id="sel-info"></span>
  <!-- Single-value input (most fields) -->
  <input id="sel-val" type="text" placeholder="new value" autocomplete="off">
  <button id="sel-apply" class="btn purple" onclick="applySelEdit()">Apply ↵</button>
  <span style="color:#3a5a80;padding:0 4px;">|</span>
  <input id="sel-factor" type="number" placeholder="× factor" step="any" title="Multiply selected values by this factor" style="width:90px;">
  <button class="btn" onclick="applyFactor()" title="Multiply each selected cell's value by the factor">× Scale</button>
  <span style="color:#3a5a80;padding:0 4px;">|</span>
  <input id="sel-pct" type="number" value="20" step="any" min="0" title="Randomize each selected cell within ±N% of its current value" style="width:70px;background:#06101e;color:#e0e0e0;border:1px solid #3a6aaa;padding:4px 9px;border-radius:3px;font-size:12px;">
  <span style="color:#8aaad0;font-size:11px;">%</span>
  <button class="btn" onclick="applyRandomize()" title="Randomize each selected cell within ±N% of its current value, rounded to a nice whole number">🎲 Randomize</button>
  <!-- Range input (SlopeRange, AspectRange, WetnessRange, MicroTopoRange) -->
  <div id="sel-range">
    <label>Min</label><input id="sel-min" type="number" step="0.01" placeholder="0.00">
    <label>Max</label><input id="sel-max" type="number" step="0.01" placeholder="1.00">
    <button class="btn purple" onclick="applySelEdit()">Apply ↵</button>
  </div>
  <span id="sel-hint">Click · Shift+click to extend · Ctrl+click to add</span>
</div>

<div id="main">
  <div id="file-panel">
    <div id="fp-header">
      <span>Files</span>
      <button class="btn" onclick="openFiles()" title="Add files" style="padding:2px 8px;font-size:11px;">+ Add</button>
    </div>
    <div id="fp-body"></div>
  </div>
  <div id="grid-wrap">
    <div id="grid" class="ag-theme-alpine-dark"></div>
  </div>

  <div id="sidebar">
    <div class="sidebar-section">
      <h4 id="chart1-label">Species Distribution</h4>
      <div class="chart-wrap"><canvas id="chart1" height="180"></canvas></div>
    </div>
    <div class="sidebar-section">
      <h4 id="chart2-label">Age Class Distribution</h4>
      <div class="chart-wrap"><canvas id="chart2" height="180"></canvas></div>
    </div>
    <div class="sidebar-section" id="dispersion-section" style="display:none;">
      <h4 id="dispersion-section-title">Dispersion Pattern</h4>
      <div class="chart-wrap">
        <div id="dispersion-scale-row" style="display:flex;align-items:center;gap:8px;padding:0 0 6px;">
          <label style="font-size:10px;color:#7a9abf;text-transform:uppercase;letter-spacing:0.5px;">Scale</label>
          <input id="dispersion-scale" type="range" min="0" max="9" value="4" step="1" style="flex:1;accent-color:#5a9ae0;">
          <span id="dispersion-scale-label" style="font-size:11px;color:#90b8e8;min-width:64px;text-align:right;font-variant-numeric:tabular-nums;">100 m</span>
        </div>
        <canvas id="dispersion-canvas" height="200" style="border:1px solid #0f3460;border-radius:4px;background:#0a1422;display:block;"></canvas>
        <div id="dispersion-info" style="padding:8px 4px 0;font-size:11px;color:#7a9abf;text-align:center;line-height:1.5;"></div>
      </div>
    </div>

</div>

<!-- Variants Modal -->
<div id="modal-bg">
  <div id="modal">
    <div id="modal-head">
      <h3 id="modal-title">Mesh Variants</h3>
      <button class="btn" onclick="closeModal()">✕ Close</button>
    </div>
    <div id="modal-sel-bar">
      <button class="btn" onclick="clearModalSel()" title="Clear selection (Esc)">✕</button>
      <span id="modal-sel-info"></span>
      <input id="modal-sel-val" type="text" placeholder="new value" autocomplete="off">
      <button id="modal-sel-apply" class="btn purple" onclick="applyModalSelEdit()">Apply ↵</button>
      <span style="color:#3a5a80;padding:0 4px;">|</span>
      <input id="modal-sel-factor" type="number" placeholder="× factor" step="any" title="Multiply selected values by this factor" style="width:90px;background:#06101e;color:#e0e0e0;border:1px solid #3a6aaa;padding:4px 9px;border-radius:3px;font-size:12px;">
      <button class="btn" onclick="applyModalFactor()">× Scale</button>
      <span style="color:#3a5a80;font-size:11px;white-space:nowrap">Click · Shift+click · Ctrl+click</span>
    </div>
    <div id="modal-body">
      <div id="modal-grid" class="ag-theme-alpine-dark"></div>
    </div>
    <div id="modal-foot">
      <button class="btn" onclick="addVariant()">+ Add Variant</button>
      <button class="btn green" onclick="saveVariants()">✓ Save Variants</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let gridApi      = null;
let fileHandle   = null;
let thumbDir     = null;
let thumbCache   = {};
let tableType    = null;   // 'species' | 'ecosystem'
let origHeaders  = [];

// File registry
const fileRegistry = new Map(); // filename → { name, type, rows, headers, handle, dirty }
let activeFileName = null;
let isDirty        = false;
let _fpConfirmResolve = null;
let gridFiles      = []; // ordered filenames currently shown in the grid
const expandedVariantKeys = new Set(); // parentKey of expanded species rows
const variantMiniGrids    = new Map(); // parentKey → mini AG Grid api for inline variants

// Cell selection
const selectedCells = new Set();  // "rowId||field"
let anchorCell = null;            // { rowId, field } — pivot for Shift-click
let _suppressBroadcast = false;   // true during bulk updates (scale factor, etc.)

// Modal
let modalRowNode = null;
let modalGridApi = null;
const modalSelectedCells = new Set();
let modalAnchorCell = null;

// Charts
let chart1 = null, chart2 = null;

const AGE_CLASSES       = ['Seedling', 'Sapling', 'Mature', 'Dead'];
const DISPERSION_TYPES  = ['Clumping', 'Uniform', 'Random', 'Poisson'];
const RANGE_FIELDS = new Set(['SlopeRange', 'AspectRange', 'WetnessRange', 'MicroTopoRange']);
// Fields that always serialize as 6-decimal floats in UE
const FLOAT_FIELDS = new Set([
  'StemsPerHectare',
  'TargetRIndex', 'DispersionScale', 'DispersionWarpStrength',
  'SeedlingAgeWeight', 'SaplingAgeWeight', 'MatureAgeWeight', 'DeadAgeWeight',
  'EcosystemDensity', 'EdgeBlendDistance', 'SpatialNoiseSize', 'SpatialNoiseStrength',
  'ScaleByDensityMin', 'ScaleByDensityMax',
  'AgeClassWeight', 'AlignToSurface', 'ZPositionOffset', '_scaleX', '_scaleY',
]);

// ═══════════════════════════════════════════════════════
// UE FORMAT HELPERS
// ═══════════════════════════════════════════════════════
const ff = n => parseFloat(n || 0).toFixed(6);

// Round a number to a "nice" value whose trailing digits are only 0s or a 5
// (e.g. 20, 45, 150, 500, 1250, 2500, 10000). Step is picked from
// {5, 10, 50, 100, 500, 1000, ...} so the rounded result has ~5–10% granularity.
// Small values (<5) keep one decimal so randomize still produces variation.
function niceRound(value) {
  const abs = Math.abs(value);
  if (abs < 1) return Math.round(value * 100) / 100;
  if (abs < 5) return Math.round(value * 10) / 10;
  const target = Math.max(5, abs / 10);
  const steps = [5, 10, 50, 100, 500, 1000, 5000, 10000, 50000, 100000, 500000];
  let step = 5;
  for (const s of steps) { if (s <= target) step = s; else break; }
  return Math.sign(value) * Math.round(abs / step) * step;
}

function parseVec2(s) {
  const m = String(s).match(/X=([\d.eE+-]+),Y=([\d.eE+-]+)/);
  if (m) return { x: m[1], y: m[2] };
  const p = String(s).split(',');
  return p.length === 2 ? { x: p[0].trim(), y: p[1].trim() } : { x: '0', y: '1' };
}
function parseColor(s) {
  const m = String(s).match(/R=([\d.]+),G=([\d.]+),B=([\d.]+),A=([\d.]+)/);
  return m ? { r: +m[1], g: +m[2], b: +m[3], a: +m[4] } : { r: 1, g: 1, b: 1, a: 1 };
}
function colorHex(c) {
  const h = v => Math.round(Math.min(1, Math.max(0, v)) * 255).toString(16).padStart(2, '0');
  return `#${h(c.r)}${h(c.g)}${h(c.b)}`;
}

// ═══════════════════════════════════════════════════════
// FLOAT FORMATTING
// If the user types a whole number into a float field,
// auto-expand to 6 decimal places.
// ═══════════════════════════════════════════════════════
function maybeFormatFloat(val, field, selCells, api) {
  const trimmed = val.trim();
  if (!/^-?\d+$/.test(trimmed)) return trimmed;
  // Known float field — always expand
  if (FLOAT_FIELDS.has(field)) return parseFloat(trimmed).toFixed(6);
  // Generic fallback: peek at any existing cell for this field
  for (const key of selCells) {
    const [rowId, f] = key.split('||');
    if (f !== field) continue;
    const existing = String(api.getRowNode(rowId)?.data[field] ?? '');
    if (/\.\d/.test(existing)) return parseFloat(trimmed).toFixed(6);
  }
  return trimmed;
}

// ═══════════════════════════════════════════════════════
// MESH VARIANTS  parse / serialize
// ═══════════════════════════════════════════════════════
function parseMeshVariants(raw) {
  if (!raw || raw.trim() === '' || raw.trim() === '()') return [];
  let s = raw.trim();
  if (s[0] === '(' && s[s.length - 1] === ')') s = s.slice(1, -1);

  const parts = [];
  let depth = 0, start = 0;
  for (let i = 0; i < s.length; i++) {
    if (s[i] === '(') depth++;
    else if (s[i] === ')') {
      depth--;
      if (depth === 0) {
        parts.push(s.slice(start, i + 1).trim());
        while (s[i + 1] === ',' || s[i + 1] === ' ') i++;
        start = i + 1;
      }
    }
  }
  if (start < s.length) parts.push(s.slice(start).trim());

  return parts.filter(Boolean).map(part => {
    if (part[0] === '(' && part[part.length - 1] === ')') part = part.slice(1, -1);
    const obj = {};
    let i = 0;
    while (i < part.length) {
      const eq = part.indexOf('=', i);
      if (eq === -1) break;
      const key = part.slice(i, eq);
      i = eq + 1;
      if (part[i] === '"') {
        i++;
        const end = part.indexOf('"', i);
        obj[key] = part.slice(i, end);
        i = end + 1;
        if (part[i] === ',') i++;
      } else if (part[i] === '(') {
        let d = 0, st = i;
        while (i < part.length) {
          if (part[i] === '(') d++;
          else if (part[i] === ')') { d--; if (d === 0) { i++; break; } }
          i++;
        }
        obj[key] = part.slice(st, i);
        if (part[i] === ',') i++;
      } else {
        const end = part.indexOf(',', i);
        if (end === -1) { obj[key] = part.slice(i); break; }
        obj[key] = part.slice(i, end);
        i = end + 1;
      }
    }
    if (obj['ScaleRange']) {
      const m = obj['ScaleRange'].match(/X=([\d.eE+-]+),Y=([\d.eE+-]+)/);
      if (m) { obj._scaleX = m[1]; obj._scaleY = m[2]; }
    }
    return obj;
  });
}

function serializeMeshVariants(variants) {
  const entries = variants.map(v => {
    const mesh  = v['Mesh'] || '';
    const age   = v['Age Class'] || 'Mature';
    const aw    = ff(v['AgeClassWeight']);
    const sx    = ff(v['_scaleX']);
    const sy    = ff(v['_scaleY']);
    const align = ff(v['AlignToSurface']);
    const z     = ff(v['ZPositionOffset']);
    return `(Mesh="${mesh}",Age Class=${age},AgeClassWeight=${aw},ScaleRange=(X=${sx},Y=${sy}),AlignToSurface=${align},ZPositionOffset=${z})`;
  });
  return `(${entries.join(',')})`;
}

function detectType(headers) {
  if (headers.includes('MeshVariants')) return 'species';
  if (headers.includes('SpeciesList'))  return 'ecosystem';
  return 'generic';
}

// ═══════════════════════════════════════════════════════
// CELL SELECTION
// ═══════════════════════════════════════════════════════
const cellKey = (rowId, field) => `${rowId}||${field}`;

// Inject CSS rules that target cells by their AG Grid row-id / col-id attributes.
// This lives entirely outside AG Grid's DOM so re-renders can never wipe the highlight.
function applySelHighlights() {
  let css = '';
  selectedCells.forEach(key => {
    const [rowId, field] = key.split('||');
    // Escape backslashes and double-quotes for use inside a CSS attribute string
    const r = rowId.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    const f = field.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    css += `#grid .ag-row[row-id="${r}"] .ag-cell[col-id="${f}"]`
         + `{ background-color:#1a3d78!important; color:#d8eeff!important; border-left:2px solid #4a8ae0!important; }\n`;
  });
  let el = document.getElementById('sel-hl-css');
  if (!el) { el = document.createElement('style'); el.id = 'sel-hl-css'; document.head.appendChild(el); }
  el.textContent = css;  // empty string → clears all highlights
}

function handleCellClick(params) {
  if (params.data._isLabel || params.data._isVariant) return;
  const { node, column, event } = params;
  const field = column.getColId();

  const key = cellKey(node.id, field);

  if (event.ctrlKey || event.metaKey) {
    // Toggle this individual cell (allows cross-column selection)
    if (selectedCells.has(key)) selectedCells.delete(key);
    else                         selectedCells.add(key);
    anchorCell = { rowId: node.id, field };

  } else if (event.shiftKey && anchorCell && anchorCell.field === field) {
    // Extend range within the same column from anchor to here
    const allNodes = [];
    params.api.forEachNodeAfterFilterAndSort(n => { if (!n.data._isLabel && !n.data._isVariant) allNodes.push(n); });
    const ai = allNodes.findIndex(n => n.id === anchorCell.rowId);
    const ci = allNodes.findIndex(n => n.id === node.id);
    const [lo, hi] = [Math.min(ai, ci), Math.max(ai, ci)];
    for (let i = lo; i <= hi; i++) selectedCells.add(cellKey(allNodes[i].id, field));

  } else {
    // Plain click — select only this cell, deselect everything else
    selectedCells.clear();
    selectedCells.add(key);
    anchorCell = { rowId: node.id, field };
  }

  applySelHighlights();
  updateSelBar();
  if (tableType === 'species' || tableType === 'ecosystem') renderDispersionForSelection();
}

// ═══════════════════════════════════════════════════════
// SELECTION BAR
// ═══════════════════════════════════════════════════════
function updateSelBar() {
  const bar   = document.getElementById('sel-bar');
  const info  = document.getElementById('sel-info');
  const input = document.getElementById('sel-val');
  const apply = document.getElementById('sel-apply');
  const range = document.getElementById('sel-range');
  const minEl = document.getElementById('sel-min');
  const maxEl = document.getElementById('sel-max');

  if (selectedCells.size === 0) { bar.classList.remove('on'); return; }
  bar.classList.add('on');

  const fields    = new Set([...selectedCells].map(k => k.split('||')[1]));
  const colCount  = fields.size;
  const cellCount = selectedCells.size;

  if (colCount === 1) {
    const field   = [...fields][0];
    const colDef  = gridApi.getColumn(field)?.getColDef();
    const colName = colDef?.headerName || field;

    info.textContent = `${colName}  ·  ${cellCount} cell${cellCount !== 1 ? 's' : ''} selected`;

    // Collect existing values
    const vals = new Set();
    selectedCells.forEach(k => {
      const [rowId] = k.split('||');
      const node = gridApi.getRowNode(rowId);
      if (node) vals.add(String(node.data[field] ?? ''));
    });
    const sameVal = vals.size === 1 ? [...vals][0] : null;

    if (RANGE_FIELDS.has(field)) {
      // Range field: show min/max inputs, hide single input
      input.style.display = 'none';
      apply.style.display = 'none';
      range.classList.add('on');
      if (sameVal) {
        const v = parseVec2(sameVal);
        minEl.value = parseFloat(v.x);
        maxEl.value = parseFloat(v.y);
      } else {
        minEl.value = ''; maxEl.value = '';
        minEl.placeholder = 'min'; maxEl.placeholder = 'max';
      }
      minEl.focus();
    } else {
      // Normal field: show single input, hide range inputs
      input.style.display = '';
      apply.style.display = '';
      range.classList.remove('on');
      input.value       = sameVal ?? '';
      input.placeholder = sameVal === null ? 'multiple values…' : '';
      input.disabled    = false;
      apply.disabled    = false;
      // Don't auto-focus the input — focusing an external element causes AG Grid
      // to re-render the previously-focused cell, wiping our cell-sel class.
    }

  } else {
    info.textContent  = `${cellCount} cells in ${colCount} columns · Ctrl+click within one column to bulk-edit`;
    input.style.display = ''; apply.style.display = '';
    range.classList.remove('on');
    input.value = ''; input.placeholder = 'select one column';
    input.disabled = true; apply.disabled = true;
  }
}

function clearSel() {
  selectedCells.clear();
  anchorCell = null;
  applySelHighlights();
  document.getElementById('sel-bar').classList.remove('on');
  document.getElementById('dispersion-section').style.display = 'none';
  dispCurrentRowIds = [];
}

function applySelEdit() {
  const fields = new Set([...selectedCells].map(k => k.split('||')[1]));
  if (fields.size !== 1) return;
  const field = [...fields][0];

  let val;
  if (RANGE_FIELDS.has(field)) {
    // Serialize as UE Vector2D: (X=0.000000,Y=1.000000)
    const minRaw = document.getElementById('sel-min').value;
    const maxRaw = document.getElementById('sel-max').value;
    val = `(X=${ff(minRaw)},Y=${ff(maxRaw)})`;
  } else {
    // Auto-format whole numbers to match the float precision of the field
    val = maybeFormatFloat(document.getElementById('sel-val').value, field, selectedCells, gridApi);
    document.getElementById('sel-val').value = val;
  }

  let count = 0;
  selectedCells.forEach(k => {
    const [rowId] = k.split('||');
    const node = gridApi.getRowNode(rowId);
    if (node) { node.setDataValue(field, val); count++; }
  });

  updateCharts();
  setTimeout(applySelHighlights, 0);
  if (DISPERSION_FIELDS.has(field) || NOISE_FIELDS.has(field)) refreshDispersionIfActive();
  setStatus(`"${val}" → ${count} cell${count !== 1 ? 's' : ''} in ${field}`);
  markDirtyFromSelection();
}

function applyScaleFactor(selCells, api, factorInputId, highlightFn, chartFn) {
  const factor = parseFloat(document.getElementById(factorInputId).value);
  if (isNaN(factor)) { setStatus('Enter a numeric factor first'); return; }

  const fields = new Set([...selCells].map(k => k.split('||')[1]));
  if (fields.size !== 1) return;
  const field = [...fields][0];
  if (RANGE_FIELDS.has(field)) { setStatus('Scale factor not supported for range fields'); return; }

  const isFloat = FLOAT_FIELDS.has(field);
  // Compute all new values first using current data, before any setDataValue calls
  const updates = [];
  selCells.forEach(k => {
    const [rowId] = k.split('||');
    const node = api.getRowNode(rowId);
    if (!node) return;
    const cur = parseFloat(node.data[field]);
    if (isNaN(cur)) return;
    const result = cur * factor;
    updates.push({ node, newVal: isFloat ? result.toFixed(6) : String(result) });
  });
  // Directly mutate node data and refresh cells instead of using setDataValue,
  // so onCellValueChanged's broadcast-to-selection logic never fires.
  updates.forEach(({ node, newVal }) => { node.data[field] = newVal; });
  api.refreshCells({ rowNodes: updates.map(u => u.node), columns: [field], force: true });
  const count = updates.length;

  if (chartFn) chartFn();
  setTimeout(highlightFn, 0);
  if (DISPERSION_FIELDS.has(field) || NOISE_FIELDS.has(field)) refreshDispersionIfActive();
  setStatus(`×${factor} → ${count} cell${count !== 1 ? 's' : ''} in ${field}`);
  markDirtyFromSelection();
}

function applyFactor()      { applyScaleFactor(selectedCells,      gridApi,      'sel-factor',       applySelHighlights,      updateCharts); }
function applyModalFactor() { applyScaleFactor(modalSelectedCells, modalGridApi, 'modal-sel-factor', applyModalSelHighlights, null); }

function applyRandomizeRange(selCells, api, pctInputId, highlightFn, chartFn) {
  const pct = parseFloat(document.getElementById(pctInputId).value);
  if (isNaN(pct) || pct <= 0) { setStatus('Enter a percentage first (e.g. 20 for ±20%)'); return; }

  const fields = new Set([...selCells].map(k => k.split('||')[1]));
  if (fields.size !== 1) return;
  const field = [...fields][0];
  if (RANGE_FIELDS.has(field)) { setStatus('Randomize not supported for range fields'); return; }

  const isFloat = FLOAT_FIELDS.has(field);
  const updates = [];
  selCells.forEach(k => {
    const [rowId] = k.split('||');
    const node = api.getRowNode(rowId);
    if (!node) return;
    const cur = parseFloat(node.data[field]);
    if (isNaN(cur)) return;
    const factor  = 1 + (Math.random() * 2 - 1) * (pct / 100);
    const rounded = niceRound(cur * factor);
    updates.push({ node, newVal: isFloat ? rounded.toFixed(6) : String(rounded) });
  });
  if (updates.length === 0) { setStatus('No numeric cells to randomize'); return; }
  updates.forEach(({ node, newVal }) => { node.data[field] = newVal; });
  api.refreshCells({ rowNodes: updates.map(u => u.node), columns: [field], force: true });

  if (chartFn) chartFn();
  setTimeout(highlightFn, 0);
  if (DISPERSION_FIELDS.has(field) || NOISE_FIELDS.has(field)) refreshDispersionIfActive();
  setStatus(`🎲 ±${pct}% → ${updates.length} cell${updates.length !== 1 ? 's' : ''} in ${field}`);
  markDirtyFromSelection();
}

function applyRandomize() { applyRandomizeRange(selectedCells, gridApi, 'sel-pct', applySelHighlights, updateCharts); }

// Keyboard shortcuts on all selection bar inputs
document.addEventListener('DOMContentLoaded', () => {
  ['sel-val', 'sel-min', 'sel-max'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); applySelEdit(); }
      if (e.key === 'Escape') { e.preventDefault(); clearSel(); }
    });
  });
  document.getElementById('sel-factor').addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); applyFactor(); }
    if (e.key === 'Escape') { e.preventDefault(); clearSel(); }
  });
  document.getElementById('sel-pct').addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); applyRandomize(); }
    if (e.key === 'Escape') { e.preventDefault(); clearSel(); }
  });
  document.getElementById('modal-sel-val').addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); applyModalSelEdit(); }
    if (e.key === 'Escape') { e.preventDefault(); clearModalSel(); }
  });
  document.getElementById('modal-sel-factor').addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); applyModalFactor(); }
    if (e.key === 'Escape') { e.preventDefault(); clearModalSel(); }
  });

  const dispScaleEl   = document.getElementById('dispersion-scale');
  const dispScaleLbl  = document.getElementById('dispersion-scale-label');
  const fmtMeters = m => m >= 1000 ? `${m / 1000} km` : `${m} m`;
  dispScaleLbl.textContent = fmtMeters(dispGridSizeM);
  dispScaleEl.addEventListener('input', () => {
    const idx = Math.max(0, Math.min(DISP_SCALE_STEPS_M.length - 1, +dispScaleEl.value | 0));
    dispGridSizeM = DISP_SCALE_STEPS_M[idx];
    dispScaleLbl.textContent = fmtMeters(dispGridSizeM);
    refreshDispersionIfActive();
  });
});

  return `<span style="color:#7EC8F8;cursor:pointer;user-select:none">▣ ${n} variant${n !== 1 ? 's' : ''}</span>`;
}
function colorRenderer(p) {
  const hex = colorHex(parseColor(p.value));
  return `<span style="display:inline-flex;align-items:center;gap:5px">
    <span style="width:14px;height:14px;background:${hex};border-radius:2px;border:1px solid #444;display:inline-block;flex-shrink:0"></span>
    <span style="font-size:11px;color:#aaa">${hex}</span>
  </span>`;

function rangeRenderer(p) {
  if (!p.value) return '';
  const v = parseVec2(p.value);
  return `${parseFloat(v.x).toFixed(2)} – ${parseFloat(v.y).toFixed(2)}`;
}

// ═══════════════════════════════════════════════════════
// CSV  PARSE / SERIALIZE
// ═══════════════════════════════════════════════════════
function parseCSV(text) {
  const res = Papa.parse(text.trim(), { header: false, skipEmptyLines: true });
  if (res.data.length < 2) return { headers: [], rows: [] };
  const headers = res.data[0];
  const rows    = res.data.slice(1).map(row => {
    const obj = { _key: row[0] };
    headers.slice(1).forEach((h, i) => { obj[h] = row[i + 1] ?? ''; });
    return obj;
  });
  return { headers, rows };
}

function serializeCSV(rows, headers) {
  headers = headers || origHeaders;
  const escVal = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
  const lines = [headers.join(',')];
  rows.forEach(r => {
    const cols = [r._key];
    headers.slice(1).forEach(h => cols.push(escVal(r[h] ?? '')));
    lines.push(cols.join(','));
  });
  return lines.join('\r\n') + '\r\n';
}

// ═══════════════════════════════════════════════════════
// GRID INIT
// ═══════════════════════════════════════════════════════
function initGrid(rows, defs) {
  variantMiniGrids.forEach(api => { try { api.destroy(); } catch(e) {} });
  variantMiniGrids.clear();
  expandedVariantKeys.clear();
  if (gridApi) { gridApi.destroy(); gridApi = null; }
  clearSel();

  gridApi = agGrid.createGrid(document.getElementById('grid'), {
    columnDefs: defs,
    rowData: rows,
    animateRows: true,
    suppressRowClickSelection: true,
    stopEditingWhenCellsLoseFocus: true,
    defaultColDef: { resizable: true, sortable: true },
    getRowId:    p => p.data._gid || p.data._key,
    getRowClass: p => p.data._isLabel ? 'grid-file-label-row' : '',

    isFullWidthRow: p => !!p.rowNode.data._isLabel || !!p.rowNode.data._isVariant,
    fullWidthCellRenderer: params => {
      if (params.data._isVariant) return buildVariantRowElement(params);
      const div = document.createElement('div');
      div.className = 'grid-label-row-cell';
      const swatch = document.createElement('span');
      swatch.className = 'fp-swatch';
      swatch.style.background = params.data._labelColor || '#3a5a80';
      div.appendChild(swatch);
      div.appendChild(document.createTextNode(params.data._labelText || ''));
      return div;
    },
    getRowHeight: params => {
      if (params.data?._isVariant) {
        const n = params.data._variants?.length ?? 0;
        return 28 + n * 52 + 36;
      }
    },

    onCellClicked: handleCellClick,

    onCellValueChanged(params) {
      if (params.data._isLabel) return;
      const field = params.column.getColId();
      let newVal  = params.newValue;

      // Auto-format bare integers in known float fields (direct-edit path)
      if (FLOAT_FIELDS.has(field) && /^-?\d+$/.test(String(newVal ?? '').trim())) {
        newVal = parseFloat(newVal).toFixed(6);
        params.node.data[field] = newVal;
        params.api.refreshCells({ rowNodes: [params.node], columns: [field], force: true });
      }

      // If this edited cell is part of a multi-cell selection,
      // propagate the new value to all other selected cells in the same column.
      const thisKey = cellKey(params.node.id, field);
      if (!_suppressBroadcast && selectedCells.has(thisKey) && selectedCells.size > 1) {
        selectedCells.forEach(k => {
          const [rowId, f] = k.split('||');
          if (f === field && rowId !== params.node.id) {
            gridApi.getRowNode(rowId)?.setDataValue(field, newVal);
          }
        });
        document.getElementById('sel-val').value = newVal;
      }
      updateCharts();
      setTimeout(applySelHighlights, 0);
      if (DISPERSION_FIELDS.has(field) || NOISE_FIELDS.has(field)) setTimeout(refreshDispersionIfActive, 0);
      // Mark the owning file dirty
      const dfile = params.data._file;
      if (dfile && dfile !== activeFileName) { const r = fileRegistry.get(dfile); if (r) { r.dirty = true; renderFilePanel(); } }
      else markDirty();
    },
  });

  updateCharts();
}

// ═══════════════════════════════════════════════════════
// INLINE MESH VARIANT ROWS
// ═══════════════════════════════════════════════════════
function toggleVariantExpand(node) {
  const k = node.data._gid || node.data._key;
  if (expandedVariantKeys.has(k)) {
    collapseVariantsForKey(k);
  } else {
    const variants = parseMeshVariants(node.data.MeshVariants || '');
    const variantRow = {
      _isVariant: true,
      _parentKey:  k,
      _variants:   variants,
      _key:  k + ':::variants',
      _gid:  k + ':::variants',
      _file: node.data._file,
    };
    gridApi.applyTransaction({ add: [variantRow], addIndex: node.rowIndex + 1 });
    expandedVariantKeys.add(k);
    gridApi.refreshCells({ rowNodes: [node], columns: ['_key'], force: true });
  }
}

function collapseVariantsForKey(parentKey) {
  const variantNode = gridApi?.getRowNode(parentKey + ':::variants');
  if (variantNode) gridApi.applyTransaction({ remove: [variantNode.data] });
  const miniApi = variantMiniGrids.get(parentKey);
  if (miniApi) { try { miniApi.destroy(); } catch(e) {} variantMiniGrids.delete(parentKey); }
  expandedVariantKeys.delete(parentKey);
  const parentNode = gridApi?.getRowNode(parentKey);
  if (parentNode) gridApi.refreshCells({ rowNodes: [parentNode], columns: ['_key'], force: true });
}

function buildVariantRowElement(params) {
  const parentKey = params.data._parentKey;

  const wrap = document.createElement('div');
  wrap.className = 'variant-inline-wrap';

  const gridDiv = document.createElement('div');
  gridDiv.className = 'ag-theme-alpine-dark';
  gridDiv.style.height = (28 + (params.data._variants?.length ?? 0) * 52) + 'px';
  wrap.appendChild(gridDiv);

  const footer = document.createElement('div');
  footer.className = 'variant-inline-footer';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn';
  addBtn.textContent = '+ Add Variant';
  footer.appendChild(addBtn);
  wrap.appendChild(footer);

  // Destroy any stale mini-grid for this parent (e.g. after resetRowHeights recreates the cell)
  const oldApi = variantMiniGrids.get(parentKey);
  if (oldApi) { try { oldApi.destroy(); } catch(e) {} variantMiniGrids.delete(parentKey); }

  function syncToParent() {
    const mapi = variantMiniGrids.get(parentKey);
    if (!mapi) return;
    const variants = [];
    mapi.forEachNode(n => variants.push(n.data));
    params.data._variants = variants;
    const parentNode = gridApi?.getRowNode(parentKey);
    if (parentNode) {
      parentNode.data.MeshVariants = serializeMeshVariants(variants);
      gridApi.refreshCells({ rowNodes: [parentNode], columns: ['MeshVariants'], force: true });
      const dfile = parentNode.data._file;
      if (dfile && dfile !== activeFileName) {
        const rec = fileRegistry.get(dfile); if (rec) { rec.dirty = true; renderFilePanel(); }
      } else markDirty();
    }
  }

  function updateHeight() {
    const n = params.data._variants?.length ?? 0;
    gridDiv.style.height = (28 + n * 52) + 'px';
    const variantNode = gridApi?.getRowNode(params.data._gid || params.data._key);
    if (variantNode) gridApi.resetRowHeights();
  }

  const colDefs = [
    { colId: '_thumb', headerName: '', width: 56, editable: false, sortable: false, resizable: false, suppressMenu: true,
      cellRenderer(p) {
        const w = document.createElement('div');
        w.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;';
        const url = thumbCache[getMeshName(p.data?.Mesh || '')];
        if (url) {
          const img = document.createElement('img');
          img.style.cssText = 'max-height:44px;max-width:50px;object-fit:contain;cursor:zoom-in;';
          img.src = url;
          const popup = document.getElementById('thumb-popup');
          img.addEventListener('mouseenter', () => { popup.innerHTML = `<img src="${url}">`; popup.style.display = 'block'; });
          img.addEventListener('mousemove', e => {
            const pw = 452, ph = 452, pad = 14;
            popup.style.left = (e.clientX + pad + pw > window.innerWidth ? e.clientX - pw - pad : e.clientX + pad) + 'px';
            popup.style.top  = (e.clientY + pad + ph > window.innerHeight ? e.clientY - ph - pad : e.clientY + pad) + 'px';
          });
          img.addEventListener('mouseleave', () => { popup.style.display = 'none'; });
          w.appendChild(img);
        }
        return w;
      }
    },
    { field: 'Mesh',            headerName: 'Mesh Asset Path', editable: true, flex: 1, minWidth: 180 },
    { field: 'Age Class',       headerName: 'Age Class',   editable: true, width: 110,
      cellEditor: 'agSelectCellEditor', cellEditorParams: { values: AGE_CLASSES } },
    { field: 'AgeClassWeight',  headerName: 'Age Wt',      editable: true, width: 80,  type: 'numericColumn' },
    { field: '_scaleX',         headerName: 'Scale Min',   editable: true, width: 90,  type: 'numericColumn' },
    { field: '_scaleY',         headerName: 'Scale Max',   editable: true, width: 90,  type: 'numericColumn' },
    { field: 'AlignToSurface',  headerName: 'Align',       editable: true, width: 72,  type: 'numericColumn' },
    { field: 'ZPositionOffset', headerName: 'Z Offset',    editable: true, width: 80,  type: 'numericColumn' },
    { field: '_del', headerName: '', width: 40, editable: false, sortable: false, resizable: false, suppressMenu: true,
      cellRenderer(p) {
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.title = 'Remove variant';
        btn.style.cssText = 'background:none;border:none;color:#cc5555;cursor:pointer;font-size:14px;padding:0;width:100%;line-height:1;';
        btn.onclick = () => {
          const mapi = variantMiniGrids.get(parentKey);
          if (!mapi) return;
          mapi.applyTransaction({ remove: [p.data] });
          syncToParent();
          updateHeight();
        };
        return btn;
      }
    },
  ];

  const miniApi = agGrid.createGrid(gridDiv, {
    columnDefs: colDefs,
    rowData: [...(params.data._variants || [])],
    rowHeight: 52,
    headerHeight: 28,
    suppressRowClickSelection: true,
    animateRows: false,
    defaultColDef: { resizable: true, sortable: false },
    onCellValueChanged(p) {
      const f = p.column.getColId();
      let v = p.newValue;
      if (FLOAT_FIELDS.has(f) && /^-?\d+$/.test(String(v ?? '').trim())) {
        v = parseFloat(v).toFixed(6);
        p.node.data[f] = v;
        p.api.refreshCells({ rowNodes: [p.node], columns: [f], force: true });
      }
      syncToParent();
    },
  });
  variantMiniGrids.set(parentKey, miniApi);

  addBtn.onclick = () => {
    miniApi.applyTransaction({ add: [{
      Mesh: '', 'Age Class': 'Mature', AgeClassWeight: '1.000000',
      _scaleX: '0.800000', _scaleY: '1.200000', AlignToSurface: '0.500000', ZPositionOffset: '0.000000'
    }]});
    syncToParent();
    updateHeight();
  };

  return wrap;
}

const chartBase = {
  responsive: true, maintainAspectRatio: true,
  plugins: {
    legend: { labels: { color: '#8aaad0', font: { size: 10 }, boxWidth: 10, padding: 6 } },
    datalabels: { display: false }   // disabled by default; chart2 overrides per-dataset
  },
  scales: {
    x: { ticks: { color: '#8aaad0', font: { size: 9 } }, grid: { color: '#1e3050' } },
    y: { ticks: { color: '#a0c0e0', font: { size: 9 } }, grid: { color: '#1e3050' } }
  }
};

function updateCharts() {
  if (!gridApi || !tableType) return;
  const rows = [];
  gridApi.forEachNode(n => { if (!n.data._isLabel && !n.data._isVariant) rows.push(n.data); });
  const labels = rows.map(r => r._key);

  if (tableType === 'species') {
    document.getElementById('chart1-label').textContent = 'Species Distribution';
    document.getElementById('chart2-label').textContent = 'Age Class Distribution';

    if (chart1) chart1.destroy();
    chart1 = new Chart(document.getElementById('chart1'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Stems / ha', data: rows.map(r => +r.StemsPerHectare || 0), backgroundColor: '#4dabf7' }] },
      options: { ...chartBase, indexAxis: 'y', plugins: { ...chartBase.plugins, legend: { display: false } } }
    });
    if (chart2) chart2.destroy();
    // Count MeshVariants per age class per species row
    const vcounts = { Seedling: [], Sapling: [], Mature: [], Dead: [] };
    rows.forEach(r => {
      const variants = parseMeshVariants(r.MeshVariants || '');
      const tally = { Seedling: 0, Sapling: 0, Mature: 0, Dead: 0 };
      variants.forEach(v => { const ac = v['Age Class']; if (ac in tally) tally[ac]++; });
      AGE_CLASSES.forEach(ac => vcounts[ac].push(tally[ac]));
    });
    // Normalize age class weights so every row's bar totals 5 — shows ratios, not raw values
    const ageFields = { Seedling: 'SeedlingAgeWeight', Sapling: 'SaplingAgeWeight', Mature: 'MatureAgeWeight', Dead: 'DeadAgeWeight' };
    const normData  = { Seedling: [], Sapling: [], Mature: [], Dead: [] };
    rows.forEach(r => {
      const raw   = {};
      AGE_CLASSES.forEach(ac => raw[ac] = +r[ageFields[ac]] || 0);
      const total = AGE_CLASSES.reduce((s, ac) => s + raw[ac], 0);
      const scale = total > 0 ? 5 / total : 0;
      AGE_CLASSES.forEach(ac => normData[ac].push(raw[ac] * scale));
    });
    const ageColors = { Seedling: '#2d7a53', Sapling: '#1a5c3c', Mature: '#0e3d27', Dead: '#4a2214' };
    chart2 = new Chart(document.getElementById('chart2'), {
      type: 'bar',
      data: { labels, datasets: AGE_CLASSES.map(ac => ({
        label: ac,
        data: normData[ac],
        backgroundColor: ageColors[ac],
        _vcounts: vcounts[ac],   // carried through to the inline draw plugin below
      })) },
      // Inline plugin: draws variant counts directly onto the canvas after each render.
      // More reliable than chartjs-plugin-datalabels for per-dataset overrides.
      plugins: [{
        id: 'variantCounts',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;
          chart.data.datasets.forEach((ds, di) => {
            if (!ds._vcounts) return;
            chart.getDatasetMeta(di).data.forEach((bar, ri) => {
              const count = ds._vcounts[ri];
              if (!count) return;
              const segW = Math.abs(bar.x - bar.base);
              if (segW < 14) return;   // segment too narrow to label
              ctx.save();
              ctx.fillStyle = '#fff';
              ctx.font = 'bold 9px sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(String(count), (bar.x + bar.base) / 2, bar.y);
              ctx.restore();
            });
          });
        }
      }],
      options: { ...chartBase, indexAxis: 'y',
        plugins: {
          ...chartBase.plugins,
          tooltip: {
            callbacks: {
              label: ctx => {
                const ac = ctx.dataset.label;
                const count = ctx.dataset._vcounts?.[ctx.dataIndex] ?? 0;
                return ` ${ac}: ${count} variant${count !== 1 ? 's' : ''}`;
              }
            }
          }
        },
        scales: {
          x: { ...chartBase.scales.x, stacked: true, max: 5, ticks: { display: false } },
          y: { ...chartBase.scales.y, stacked: true }
        }
      }
    });
  }

  if (tableType === 'ecosystem') {
    document.getElementById('chart1-label').textContent = 'Ecosystem Density';
    document.getElementById('chart2-label').textContent = 'Spatial Noise Strength';
    const bgColors = rows.map(r => colorHex(parseColor(r.EcosystemColor)));
    if (chart1) chart1.destroy();
    chart1 = new Chart(document.getElementById('chart1'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Density', data: rows.map(r => +r.EcosystemDensity || 0), backgroundColor: bgColors }] },
      options: { ...chartBase, indexAxis: 'y', plugins: { ...chartBase.plugins, legend: { display: false } } }
    });
    if (chart2) chart2.destroy();
    chart2 = new Chart(document.getElementById('chart2'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Noise Strength', data: rows.map(r => +r.SpatialNoiseStrength || 0), backgroundColor: '#a78bfa' }] },
      options: { ...chartBase, indexAxis: 'y', plugins: { ...chartBase.plugins, legend: { display: false } } }
    });
  }
}

// CSS-injection highlights for the modal grid (same technique as main grid)
function applyModalSelHighlights() {
  let css = '';
  modalSelectedCells.forEach(key => {
    const [rowId, field] = key.split('||');
    const r = rowId.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    const f = field.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    css += `#modal-grid .ag-row[row-id="${r}"] .ag-cell[col-id="${f}"]`
         + `{ background-color:#1a3d78!important; color:#d8eeff!important; border-left:2px solid #4a8ae0!important; }\n`;
  });
  let el = document.getElementById('modal-sel-hl-css');
  if (!el) { el = document.createElement('style'); el.id = 'modal-sel-hl-css'; document.head.appendChild(el); }
  el.textContent = css;
}

function handleModalCellClick(params) {
  const { node, column, event } = params;
  const field = column.getColId();
  if (field === '_del') return;
  const key = cellKey(node.id, field);
  if (event.ctrlKey || event.metaKey) {
    if (modalSelectedCells.has(key)) modalSelectedCells.delete(key);
    else                              modalSelectedCells.add(key);
    modalAnchorCell = { rowId: node.id, field };
  } else if (event.shiftKey && modalAnchorCell && modalAnchorCell.field === field) {
    const allNodes = [];
    params.api.forEachNodeAfterFilterAndSort(n => allNodes.push(n));
    const ai = allNodes.findIndex(n => n.id === modalAnchorCell.rowId);
    const ci = allNodes.findIndex(n => n.id === node.id);
    const [lo, hi] = [Math.min(ai, ci), Math.max(ai, ci)];
    for (let i = lo; i <= hi; i++) modalSelectedCells.add(cellKey(allNodes[i].id, field));
  } else {
    modalSelectedCells.clear();
    modalSelectedCells.add(key);
    modalAnchorCell = { rowId: node.id, field };
  }
  applyModalSelHighlights();
  updateModalSelBar();
}

function updateModalSelBar() {
  const bar   = document.getElementById('modal-sel-bar');
  const info  = document.getElementById('modal-sel-info');
  const input = document.getElementById('modal-sel-val');
  const apply = document.getElementById('modal-sel-apply');
  if (modalSelectedCells.size === 0) { bar.classList.remove('on'); return; }
  bar.classList.add('on');
  const fields    = new Set([...modalSelectedCells].map(k => k.split('||')[1]));
  const colCount  = fields.size;
  const cellCount = modalSelectedCells.size;
  if (colCount === 1) {
    const field   = [...fields][0];
    const colDef  = modalGridApi?.getColumn(field)?.getColDef();
    const colName = colDef?.headerName || field;
    info.textContent = `${colName}  ·  ${cellCount} cell${cellCount !== 1 ? 's' : ''} selected`;
    const vals = new Set();
    modalSelectedCells.forEach(k => {
      const [rowId] = k.split('||');
      const node = modalGridApi.getRowNode(rowId);
      if (node) vals.add(String(node.data[field] ?? ''));
    });
    const sameVal = vals.size === 1 ? [...vals][0] : null;
    input.value       = sameVal ?? '';
    input.placeholder = sameVal === null ? 'multiple values…' : 'new value';
    input.disabled    = false;
    apply.disabled    = false;
  } else {
    info.textContent  = `${cellCount} cells in ${colCount} columns · select one column to bulk-edit`;
    input.value = ''; input.placeholder = 'select one column';
    input.disabled = true; apply.disabled = true;
  }
}

function clearModalSel() {
  modalSelectedCells.clear();
  modalAnchorCell = null;
  applyModalSelHighlights();
  document.getElementById('modal-sel-bar').classList.remove('on');
}

function applyModalSelEdit() {
  const fields = new Set([...modalSelectedCells].map(k => k.split('||')[1]));
  if (fields.size !== 1) return;
  const field = [...fields][0];
  const val   = maybeFormatFloat(document.getElementById('modal-sel-val').value, field, modalSelectedCells, modalGridApi);
  document.getElementById('modal-sel-val').value = val;
  let count = 0;
  modalSelectedCells.forEach(k => {
    const [rowId] = k.split('||');
    const node = modalGridApi.getRowNode(rowId);
    if (node) { node.setDataValue(field, val); count++; }
  });
  setTimeout(applyModalSelHighlights, 0);
  setStatus(`"${val}" → ${count} cell${count !== 1 ? 's' : ''} in ${field}`);
}

              const left = e.clientX + pad + pw > window.innerWidth
                ? e.clientX - pw - pad : e.clientX + pad;
              const top  = e.clientY + pad + ph > window.innerHeight
                ? e.clientY - ph - pad : e.clientY + pad;
              popup.style.left = left + 'px';
              popup.style.top  = top  + 'px';
            });
            img.addEventListener('mouseleave', () => {
              popup.style.display = 'none';
            });

          }
          return wrap;
        },
      },
      { field: 'Mesh',            headerName: 'Mesh Asset Path', editable: true, flex: 1, minWidth: 180 },
      { field: 'Age Class',       headerName: 'Age Class',   editable: true, width: 110,
        cellEditor: 'agSelectCellEditor', cellEditorParams: { values: AGE_CLASSES } },
      { field: 'AgeClassWeight',  headerName: 'Age Wt',      editable: true, width: 80,  type: 'numericColumn' },
      { field: '_scaleX',         headerName: 'Scale Min',   editable: true, width: 90,  type: 'numericColumn' },
      { field: '_scaleY',         headerName: 'Scale Max',   editable: true, width: 90,  type: 'numericColumn' },
      { field: 'AlignToSurface',  headerName: 'Align',       editable: true, width: 72,  type: 'numericColumn' },
      { field: 'ZPositionOffset', headerName: 'Z Offset',    editable: true, width: 80,  type: 'numericColumn' },

        params.node.data[field] = newVal;
        params.api.refreshCells({ rowNodes: [params.node], columns: [field], force: true });
      }
      setTimeout(applyModalSelHighlights, 0);
    },

}

function closeModal() {

  clearModalSel();
  if (modalGridApi) { modalGridApi.destroy(); modalGridApi = null; }
  modalRowNode = null;
}

function addVariant() {
  if (!modalGridApi) return;
  modalGridApi.applyTransaction({ add: [{
    'Mesh': '', 'Age Class': 'Mature', 'AgeClassWeight': '1.000000',
    '_scaleX': '0.800000', '_scaleY': '1.200000', 'AlignToSurface': '0.500000', 'ZPositionOffset': '0.000000'
  }]});
}

function saveVariants() {
  if (!modalRowNode || !modalGridApi) return;
  const variants = [];
  modalGridApi.forEachNode(n => variants.push(n.data));
  modalRowNode.setDataValue('MeshVariants', serializeMeshVariants(variants));

// THUMBNAILS  (directory picker — for future use)

function getMeshName(path) { return (path.split('/').pop() || '').split('.')[0]; }
async function openThumbs() {
  try {
    thumbDir   = await window.showDirectoryPicker({ mode: 'read' });
    thumbCache = {};
    setStatus('Thumbnails: loading…');
    let n = 0;
    for await (const [name, handle] of thumbDir.entries()) {
      if (handle.kind !== 'file') continue;
      const lower = name.toLowerCase();
      if (!lower.endsWith('.png') && !lower.endsWith('.jpg') && !lower.endsWith('.jpeg')) continue;
      try {
        thumbCache[name.replace(/\.[^.]+$/, '')] = URL.createObjectURL(await handle.getFile());
        n++;
      } catch {}
    }
    setStatus(`Thumbnails: ${n} loaded`);
    if (modalGridApi) modalGridApi.refreshCells({ force: true });
  } catch (e) { if (e.name !== 'AbortError') setStatus('Error: ' + e.message); }
}

// ═══════════════════════════════════════════════════════
// FILE  I/O
// ═══════════════════════════════════════════════════════
function loadCsvText(text, name, handle) {
  const { headers, rows } = parseCSV(text);
  const type = detectType(headers);
  fileRegistry.set(name, { name, type, rows, headers, handle: handle || null, dirty: false });
  showFilesInGrid([name]);
}

async function openFiles() {
  if (window.showOpenFilePicker) {
    try {
      const handles = await window.showOpenFilePicker({
        multiple: true,
        types: [{ description: 'CSV files', accept: { 'text/csv': ['.csv'] } }]
      });
      for (const h of handles) {
        const file = await h.getFile();
        const { headers, rows } = parseCSV(await file.text());
        const type = detectType(headers);
        fileRegistry.set(h.name, { name: h.name, type, rows, headers, handle: h, dirty: false });
      }
      // If no file is active yet, switch to first ecosystem or first file
      if (gridFiles.length === 0) {
        const names = [...fileRegistry.keys()];
        const target = names.find(n => fileRegistry.get(n).type === 'ecosystem') || names[0];
        if (target) await switchToFile(target);
      } else {
        document.getElementById('file-panel').style.display = 'flex';
        renderFilePanel();
      }
    } catch (e) { if (e.name !== 'AbortError') setStatus('Open error: ' + e.message); }
    return;
  }
  // Fallback: hidden multi-file input (Firefox / Safari / sandboxed iframe)
  let inp = document.getElementById('_fallback-file-input');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.csv,text/csv';
    inp.multiple = true;
    inp.id = '_fallback-file-input';
    inp.style.display = 'none';
    inp.addEventListener('change', async () => {
      for (const f of inp.files) {
        try {
          const { headers, rows } = parseCSV(await f.text());
          const type = detectType(headers);
          fileRegistry.set(f.name, { name: f.name, type, rows, headers, handle: null, dirty: false });
        } catch (e) { setStatus('Open error: ' + e.message); }
      }
      if (gridFiles.length === 0) {
        const names = [...fileRegistry.keys()];
        const target = names.find(n => fileRegistry.get(n).type === 'ecosystem') || names[0];
        if (target) await switchToFile(target);
      } else {
        document.getElementById('file-panel').style.display = 'flex';
        renderFilePanel();
      }
      inp.value = '';
    });
    document.body.appendChild(inp);
  }
  inp.click();
}
async function saveFile() {
  if (!gridApi) { setStatus('Nothing to save'); return; }
  snapshotAllFiles();
  const filesToSave = gridFiles.filter(f => {
    const rec = fileRegistry.get(f);
    return rec && (f === activeFileName ? isDirty : rec.dirty);
  });
  if (filesToSave.length === 0) { setStatus('No changes to save'); return; }

  let savedCount = 0;
  for (const fname of filesToSave) {
    const rec = fileRegistry.get(fname);
    if (!rec) continue;
    const csv = serializeCSV(rec.rows, rec.headers);
    try {
      if (rec.handle) {
        const w = await rec.handle.createWritable();
        await w.write(csv); await w.close();
      } else {
        if (!window.showSaveFilePicker) throw new Error('not supported');
        const fh = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
        });
        const w = await fh.createWritable();
        await w.write(csv); await w.close();
        rec.handle = fh;
        if (fname === activeFileName) fileHandle = fh;
      }
    } catch (e) {
      if (e.name === 'AbortError') continue;
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: fname });
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    rec.dirty = false;
    if (fname === activeFileName) isDirty = false;
    savedCount++;
  }
  setStatus(savedCount === 1 ? 'Saved ✓' : `Saved ${savedCount} files ✓`);
  renderFilePanel();
}

function addRow() {

  const base = { _key: 'NewRow_' + Date.now() };

  if (tableType === 'species') Object.assign(base, {

    SeedlingAgeWeight: '1.000000', SaplingAgeWeight: '1.000000',
    MatureAgeWeight: '1.000000', DeadAgeWeight: '0.200000',

  });

function markDirty() {
  if (!activeFileName) return;
  isDirty = true;
  const rec = fileRegistry.get(activeFileName);
  if (rec) rec.dirty = true;
  renderFilePanel();
}

function markClean() {
  isDirty = false;
  const rec = fileRegistry.get(activeFileName);
  if (rec) rec.dirty = false;
  renderFilePanel();
}

function markDirtyFromSelection() {
  if (gridFiles.length <= 1) { markDirty(); return; }
  const touched = new Set();
  selectedCells.forEach(k => {
    const node = gridApi?.getRowNode(k.split('||')[0]);
    if (node && !node.data._isLabel) touched.add(node.data._file || activeFileName);
  });
  touched.forEach(f => { if (!f) return; const r = fileRegistry.get(f); if (r) r.dirty = true; });
  renderFilePanel();
}

function fpConfirmChoice(choice) {
  document.getElementById('fp-confirm').style.display = 'none';
  if (_fpConfirmResolve) { _fpConfirmResolve(choice); _fpConfirmResolve = null; }
}

function askSaveConfirm(filename) {
  return new Promise(resolve => {
    _fpConfirmResolve = resolve;
    document.getElementById('fp-confirm-name').textContent = filename || 'this file';
    document.getElementById('fp-confirm').style.display = 'flex';
  });
}

// Snapshot live grid rows back to each file's registry entry.
function snapshotAllFiles() {
  if (!gridApi) return;
  // Flush any open inline variant grids back to their parent rows first
  variantMiniGrids.forEach((miniApi, parentKey) => {
    const variants = [];
    miniApi.forEachNode(n => variants.push(n.data));
    const parentNode = gridApi.getRowNode(parentKey);
    if (parentNode && !parentNode.data._isLabel) {
      parentNode.data.MeshVariants = serializeMeshVariants(variants);
    }
  });
  const byFile = new Map();
  gridApi.forEachNode(node => {
    if (node.data._isLabel || node.data._isVariant) return;
    const fname = node.data._file || activeFileName;
    if (!fname) return;
    if (!byFile.has(fname)) byFile.set(fname, []);
    const row = { ...node.data };
    delete row._file; delete row._gid; delete row._isLabel;
    byFile.get(fname).push(row);
  });
  byFile.forEach((rows, fname) => { const rec = fileRegistry.get(fname); if (rec) rec.rows = rows; });
}

// Build the grid from an ordered list of filenames (1 = single-file, >1 = multi-file).
function showFilesInGrid(names) {
  snapshotAllFiles();
  if (names.length === 0) return;
  gridFiles = [...names];
  const multi = names.length > 1;
  activeFileName = multi ? null : names[0];
  isDirty = false;
  const firstRec = fileRegistry.get(names[0]);
  if (!firstRec) return;
  tableType   = firstRec.type;
  origHeaders = firstRec.headers;
  fileHandle  = multi ? null : firstRec.handle;

  const combinedRows = [];
  names.forEach((fname, fi) => {
    const rec = fileRegistry.get(fname);
    if (!rec) return;
    if (multi) {
      combinedRows.push({
        _isLabel: true, _labelText: fname,
        _key: ':::label:::' + fi, _gid: ':::label:::' + fi,
        _labelColor: PATTERN_COLORS[fi % PATTERN_COLORS.length]
      });
    }
    rec.rows.forEach(row => {
      combinedRows.push(multi ? { ...row, _file: fname, _gid: fname + ':::' + row._key } : { ...row });
    });
  });

  const dataCount = combinedRows.filter(r => !r._isLabel).length;
  document.getElementById('table-badge').textContent =
    tableType === 'species' ? 'Species Table' : tableType === 'ecosystem' ? 'Ecosystem Table' : 'Data Table';
  document.getElementById('file-name').textContent = multi ? `${names.length} files` : names[0];
  initGrid(combinedRows, buildColDefs(tableType, firstRec.headers));
  document.getElementById('file-panel').style.display = 'flex';
  setStatus(multi ? `${dataCount} rows from ${names.length} files` : `${firstRec.rows.length} rows`);
  renderFilePanel();
}

// Shift-click a file in the panel to add/remove it from the multi-file grid.
function toggleFileInGrid(name) {
  const rec = fileRegistry.get(name);
  if (!rec) return;
  if (gridFiles.includes(name)) {
    if (gridFiles.length === 1) return; // can't remove the last file
    showFilesInGrid(gridFiles.filter(n => n !== name));
  } else {
    if (gridFiles.length > 0 && fileRegistry.get(gridFiles[0])?.type !== rec.type) {
      setStatus('Can only combine files of the same type'); return;
    }
    showFilesInGrid([...gridFiles, name]);
  }
}

function handleFilePanelClick(event, name) {
  if (event.shiftKey) toggleFileInGrid(name);
  else switchToFile(name);
}

async function switchToFile(name) {
  if (gridFiles.length === 1 && gridFiles[0] === name) return;
  const anyDirty = gridFiles.length === 1 ? isDirty : gridFiles.some(f => fileRegistry.get(f)?.dirty);
  if (anyDirty) {
    const choice = await askSaveConfirm(activeFileName || gridFiles[0] || name);
    if (choice === 'cancel') return;
    if (choice === 'save') await saveFile();
  }
  showFilesInGrid([name]);
}

// Extract SDT asset name from a SpeciesList field value.
// Format: /Script/Engine.DataTable'/Game/.../SDT_ConesGreen.SDT_ConesGreen'
function parseSpeciesAssetName(val) {
  const m = val && val.match(/\/([^\/]+)\.\1'/);
  return m ? m[1] : null;
}

// Return unique SDT references from an ecosystem row array, with load status.
function getReferencedSDTs(rows) {
  const seen = new Map();
  (rows || []).forEach(row => {
    const assetName = parseSpeciesAssetName(row.SpeciesList);
    if (!assetName || seen.has(assetName)) return;
    const loadedFileName = [...fileRegistry.keys()].find(k =>
      k.replace(/\.csv$/i, '') === assetName
    ) || null;
    seen.set(assetName, { assetName, loadedFileName });
  });
  return [...seen.values()];
}

async function closeFile(name) {
  const rec = fileRegistry.get(name);
  if (!rec) return;

  const fileDirty = (name === activeFileName) ? isDirty : rec.dirty;

  if (fileDirty) {
    // Snapshot live grid data so rec.rows is current before saving
    snapshotAllFiles();
    const csv = serializeCSV(rec.rows, rec.headers);
    try {
      if (!window.showSaveFilePicker) throw new Error('not supported');
      const fh = await window.showSaveFilePicker({
        suggestedName: rec.name,
        types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
      });
      const w = await fh.createWritable();
      await w.write(csv); await w.close();
    } catch (e) {
      if (e.name === 'AbortError') return; // user cancelled — keep file open
      // Fallback download
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: rec.name });
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
  }

  fileRegistry.delete(name);

  if (gridFiles.includes(name)) {
    const remaining = gridFiles.filter(n => n !== name);
    if (remaining.length > 0) {
      showFilesInGrid(remaining);
    } else {
      if (gridApi) { gridApi.destroy(); gridApi = null; }
      clearSel();
      gridFiles = []; activeFileName = null; isDirty = false; fileHandle = null;
      tableType = null; origHeaders = [];
      document.getElementById('table-badge').textContent = 'No file loaded';
      document.getElementById('file-name').textContent  = '';
      document.getElementById('dispersion-section').style.display = 'none';
      dispCurrentRowIds = [];
      document.getElementById('file-panel').style.display = fileRegistry.size > 0 ? 'flex' : 'none';
      renderFilePanel();
    }
  } else {
    renderFilePanel();
  }
}

function renameFile(name) {
  const rec = fileRegistry.get(name);
  if (!rec) return;

  const displayName = name.replace(/\.csv$/i, '');
  const newDisplayName = prompt(`Rename "${displayName}" to:`, displayName);
  if (!newDisplayName || newDisplayName.trim() === '') return; // user cancelled or empty

  const newName = newDisplayName.trim() + '.csv';
  if (newName === name) return; // no change
  if (fileRegistry.has(newName)) { setStatus('File already exists: ' + newName); return; }

  // Update the record's name property and registry
  rec.name = newName;
  fileRegistry.set(newName, rec);
  fileRegistry.delete(name);

  // Update gridFiles if this file is currently open
  const gridIdx = gridFiles.indexOf(name);
  if (gridIdx >= 0) {
    gridFiles[gridIdx] = newName;
    if (activeFileName === name) activeFileName = newName;
  }

  // Refresh grid header and file panel
  if (gridIdx >= 0) {
    document.getElementById('file-name').textContent = gridFiles.length === 1 ? newName : `${gridFiles.length} files`;
  }
  renderFilePanel();
  setStatus('Renamed to: ' + newName);
}

function duplicateFile(name) {
  const rec = fileRegistry.get(name);
  if (!rec) return;
  const base = name.replace(/\.csv$/i, '');
  let newName = base + '_copy.csv';
  let n = 2;
  while (fileRegistry.has(newName)) newName = `${base}_copy${n++}.csv`;
  fileRegistry.set(newName, {
    name: newName, type: rec.type,
    rows: rec.rows.map(r => ({ ...r })),
    headers: [...rec.headers],
    handle: null, dirty: true
  });
  switchToFile(newName);
}

function renderFilePanel() {
  const body = document.getElementById('fp-body');
  if (!body) return;
  if (fileRegistry.size === 0) { body.innerHTML = ''; return; }

  const ecoFiles = [...fileRegistry.values()].filter(r => r.type === 'ecosystem');
  const spcFiles = [...fileRegistry.values()].filter(r => r.type === 'species');

  let html = '';
  const sq = n => `'${n}'`;

  // Build one entry row; shared by eco and spc sections.
  const entryHtml = (rec) => {
    const fi      = gridFiles.indexOf(rec.name);
    const isActive = gridFiles.length === 1 && fi === 0;
    const isInGrid = fi >= 0;
    const dirty    = isActive ? isDirty : rec.dirty;
    const swatch   = isInGrid ? `<span class="fp-swatch" style="background:${PATTERN_COLORS[fi % PATTERN_COLORS.length]}"></span>` : '';
    const cls      = isActive ? ' fp-active' : isInGrid ? ' fp-in-grid' : '';
    return `<div class="fp-entry${cls}" title="Click to open · Shift-click to add/remove from multi-view" onclick="handleFilePanelClick(event,${sq(rec.name)})">
      ${swatch}<span class="fp-name${dirty ? ' fp-dirty' : ''}">${esc(rec.name.replace(/\.csv$/i, ''))}${dirty ? ' *' : ''}</span>
      <button class="fp-ren-btn" title="Rename" onclick="event.stopPropagation();renameFile(${sq(rec.name)})">✎</button>
      <button class="fp-dup-btn" title="Duplicate" onclick="event.stopPropagation();duplicateFile(${sq(rec.name)})">⎘</button>
      <button class="fp-close-btn" title="Close" onclick="event.stopPropagation();closeFile(${sq(rec.name)})">✕</button>
    </div>`;
  };

  if (ecoFiles.length) {
    html += `<div class="fp-section-head">Ecosystem Tables</div>`;
    ecoFiles.forEach(rec => {
      html += entryHtml(rec);
      getReferencedSDTs(rec.rows).forEach(({ assetName, loadedFileName }) => {
        if (loadedFileName) {
          html += `<div class="fp-ref fp-ref-loaded" onclick="handleFilePanelClick(event,${sq(loadedFileName)})"><span class="fp-ref-arrow">└</span><span>${esc(assetName)}</span></div>`;
        } else {
          html += `<div class="fp-ref fp-ref-missing"><span class="fp-ref-arrow">└</span><span>${esc(assetName)}</span></div>`;
        }
      });
    });
  }

  if (spcFiles.length) {
    html += `<div class="fp-section-head">Species Tables</div>`;
    spcFiles.forEach(rec => { html += entryHtml(rec); });
  }

  body.innerHTML = html;
}

// Slider step → grid edge length in meters. Index 4 (100m) is the default.

let dispGridSizeM = 100;

  '#7ec8f8', '#f08c4a', '#5acc8a', '#a78bfa',
