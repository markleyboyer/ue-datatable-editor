// Draw a scale bar (bottom-left) sized to a "nice" round number of meters
function drawScaleBar(ctx, w, gridM) {
  const targetPx  = w * 0.22;
  const targetM   = (targetPx / w) * gridM;
  const nice      = [0.5, 1, 2, 5, 10, 20, 25, 50, 100, 200, 250, 500, 1000, 2000];
  let chosen = nice[0];
  for (const v of nice) if (v <= targetM) chosen = v;
  const barPx = (chosen / gridM) * w;
  const m     = 10;
  const x = m, y = w - m - 4;

  ctx.save();
  ctx.strokeStyle = '#90b8e8';
  ctx.lineWidth   = 2;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + barPx, y); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y - 4);             ctx.lineTo(x, y + 4);
  ctx.moveTo(x + barPx, y - 4);     ctx.lineTo(x + barPx, y + 4);
  ctx.stroke();
  ctx.fillStyle    = '#90b8e8';
  ctx.font         = '10px -apple-system, sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.textAlign    = 'left';
  ctx.fillText(chosen >= 1 ? `${chosen} m` : `${chosen * 100} cm`, x, y - 6);
  ctx.restore();
}

// Draw a small house silhouette at real-world size (10m wide × 8m deep)
// for human scale reference. Skipped if it would be too small or too large.
function drawHouseIcon(ctx, w, gridM) {
  const houseM  = 10;
  const houseDM = 8;
  const pxPerM  = w / gridM;
  const houseW  = houseM  * pxPerM;
  const bodyH   = houseDM * pxPerM;
  if (houseW < 6)    return;
  if (houseW > w * 0.9) return;

  const roofH = bodyH * 0.55;
  const m     = 10;
  const x     = w - m - houseW;
  const y     = w - m - 4 - bodyH - roofH - 14;

  ctx.save();
  ctx.strokeStyle = '#0a1422';
  ctx.lineWidth   = 1;

  // Roof (triangle)
  ctx.beginPath();
  ctx.moveTo(x - 2,          y + roofH);
  ctx.lineTo(x + houseW / 2, y);
  ctx.lineTo(x + houseW + 2, y + roofH);
  ctx.closePath();
  ctx.fillStyle = '#a85a3a';
  ctx.fill(); ctx.stroke();

  // Body (square)
  ctx.fillStyle = '#e8d8b8';
  ctx.fillRect(x, y + roofH, houseW, bodyH);
  ctx.strokeRect(x + 0.5, y + roofH + 0.5, houseW - 1, bodyH - 1);

  // Label
  ctx.fillStyle    = '#e8d8b8';
  ctx.font         = '9px -apple-system, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`house ~${houseM}m`, x + houseW / 2, y + roofH + bodyH + 2);
  ctx.restore();
}

// 2D value noise with 4-octave FBM; returns sample(u, v) → [0, 1].
// u/v are in noise-space: pass (worldX / noiseSizeM, worldY / noiseSizeM).
function makeValueNoise(seed) {
  const rng = seededRng(seed);
  const G = 64;
  const T = new Float32Array(G * G);
  for (let i = 0; i < T.length; i++) T[i] = rng();
  function lerp(a, b, t) { return a + t * (b - a); }
  function smooth(t) { return t * t * (3 - 2 * t); }
  function grid(xi, yi) { return T[((yi & (G - 1)) * G) + (xi & (G - 1))]; }
  return function sample(u, v) {
    let val = 0, amp = 1, freq = 1, total = 0;
    for (let o = 0; o < 4; o++) {
      const gx = u * freq, gy = v * freq;
      const xi = Math.floor(gx), yi = Math.floor(gy);
      const xf = smooth(gx - xi), yf = smooth(gy - yi);
      val   += lerp(lerp(grid(xi, yi), grid(xi + 1, yi), xf),
                    lerp(grid(xi, yi + 1), grid(xi + 1, yi + 1), xf), yf) * amp;
      total += amp; amp *= 0.5; freq *= 2;
    }
    return val / total;
  };
}

// mulberry32 — deterministic seeded RNG
function seededRng(seed) {
  let s = (seed | 0) || 1;
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Box-Muller standard normal
function gaussian(rng) {
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// Compute Clark-Evans nearest-neighbor R index for a point set in a unit square
function clarkEvansR(points) {
  const n = points.length;
  if (n < 2) return 0;
  let sumD = 0;
  for (let i = 0; i < n; i++) {
    let best = Infinity;
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const dx = points[i][0] - points[j][0];
      const dy = points[i][1] - points[j][1];
      const d2 = dx * dx + dy * dy;
      if (d2 < best) best = d2;
    }
    sumD += Math.sqrt(best);
  }
  const meanD    = sumD / n;
  const expected = 0.5 / Math.sqrt(n);   // unit-square area = 1
  return meanD / expected;
}

// ─── UE-faithful integer hash and uniform random ──────────────────────────────
// Approximates the UE PCG Custom HLSL `ComputeSeed(a, b)` + `FRand(seed)` flow.
// Exact bit-for-bit match isn't possible from JS, but the algorithm shape and
// the *visual* pattern character match UE's output 1:1.
function ueHash(a, b) {
  let h = (Math.imul(a | 0, 2654435761) ^ Math.imul(b | 0, 0x9E3779B9)) >>> 0;
  h = Math.imul(h ^ (h >>> 16), 0x85EBCA6B) >>> 0;
  h = Math.imul(h ^ (h >>> 13), 0xC2B2AE35) >>> 0;
  return (h ^ (h >>> 16)) >>> 0;
}
function ueFRand(seed) { return ueHash(seed, 1) / 4294967295; }

// Bilinear value noise — direct port of the inline noise UE uses for warp.
// freq is in cycles/metre; offX/offY shift the lattice for the two warp axes.
function ueValueNoise2D(px, py, freq, speciesSeed, subSeed, offX, offY) {
  const npx = px * freq + offX;
  const npy = py * freq + offY;
  const nix = Math.floor(npx), niy = Math.floor(npy);
  const nfx = npx - nix,        nfy = npy - niy;
  const nux = nfx * nfx * (3 - 2 * nfx);
  const nuy = nfy * nfy * (3 - 2 * nfy);
  const s   = ueHash(speciesSeed, subSeed);
  const v00 = (ueHash(ueHash(nix + 32768, niy + 32768), s) % 65536) / 65535;
  const v10 = (ueHash(ueHash(nix + 32769, niy + 32768), s) % 65536) / 65535;
  const v01 = (ueHash(ueHash(nix + 32768, niy + 32769), s) % 65536) / 65535;
  const v11 = (ueHash(ueHash(nix + 32769, niy + 32769), s) % 65536) / 65535;
  return (1 - nuy) * ((1 - nux) * v00 + nux * v10)
       +      nuy  * ((1 - nux) * v01 + nux * v11);
}

// Generate a dispersion pattern as N points in [0,1]² based on UE field values.
// `gridSizeM` is the real-world edge length the unit square represents.
//
// This is a port of UE's `PCG_DispersionNoise` HLSL: a dense candidate grid is
// built in metres, each candidate is domain-warped and scored by the per-type
// dispNoise formula, then the top-N by `(noise − rand)` survive — matching
// UE's downstream `noise > rand` filter while guaranteeing exactly `count`
// points for visualisation.
function generateDispersionPoints(type, targetR, scale, warp, seed, count, gridSizeM) {
  const N = Math.max(0, count | 0);
  if (N === 0) return [];

  const G          = (gridSizeM > 0) ? gridSizeM : 100;     // metres per unit-square edge
  const areaSqM    = G * G;
  const areaHa     = areaSqM / 10000;
  const stemsPerHa = N / Math.max(areaHa, 1e-9);

  // UE Clark-Evans inverse — fallback spacing when dispersionScale = 0.
  const rho  = Math.max(stemsPerHa / 10000, 1e-7);
  const rMin = Math.max(0.01, (targetR || 0) / (2 * Math.sqrt(rho)));

  // Candidate grid: oversample so the noise mask is well-resolved, capped for
  // performance. At a 100 m grid this gives ~0.6 m candidate spacing.
  const MAX_CANDS = 15000;
  const idealN    = Math.min(MAX_CANDS, Math.max(N * 6, 2000));
  const cSpacing  = Math.sqrt(areaSqM / idealN);
  const cols      = Math.ceil(G / cSpacing);
  const rows      = Math.ceil(G / cSpacing);

  const sp       = (seed | 0) >>> 0;
  const useWarp  = warp > 0;
  const refWarp  = scale > 0 ? scale : Math.max(rMin * 3.5, cSpacing * 4);
  const warpFreq = 1 / (Math.max(refWarp, 0.001) * 2);

  // Per-type derived constants
  const isClump   = (type === 'Clumping');
  const isRand    = (type === 'Random' || type === 'Poisson');
  const isUni     = (type === 'Uniform');
  const clusterSp = scale > 0 ? Math.max(scale, cSpacing * 2) : Math.max(rMin * 3.5, cSpacing * 6);
  const sigFrac   = 0.10 + Math.min(1, Math.max(0, targetR || 0)) * 0.24;
  const sigma     = clusterSp * sigFrac;
  const randCell  = scale > 0 ? Math.max(scale, cSpacing)     : Math.max(rMin, cSpacing);
  const uniGrid   = scale > 0 ? Math.max(scale, cSpacing * 2) : Math.max(rMin, cSpacing * 2);
  const jitterAmt = Math.min(1, Math.max(0, 1 - ((targetR || 0) - 1) / 1.15)) * 0.15;
  const radFrac   = 0.45 - Math.min(1, Math.max(0, ((targetR || 0) - 1) / 1.15)) * 0.30;
  const radius    = uniGrid * radFrac;
  const sharpness = 1 + Math.min(1, Math.max(0, ((targetR || 0) - 1) / 1.15)) * 8;

  // Build candidates, score by (noise − rand) so top-N matches UE's filter
  const cands = new Float64Array(cols * rows * 3); // [x_norm, y_norm, score]
  let ci = 0;

  for (let yi = 0; yi < rows; yi++) {
    for (let xi = 0; xi < cols; xi++) {
      const cx = (xi + 0.5) * cSpacing;
      const cy = (yi + 0.5) * cSpacing;
      if (cx > G || cy > G) continue;

      // Domain warp (in metres)
      let wx = cx, wy = cy;
      if (useWarp) {
        const wX = ueValueNoise2D(cx, cy, warpFreq, sp, 1234567, 0,    13.71) * 2 - 1;
        const wY = ueValueNoise2D(cx, cy, warpFreq, sp, 7654321, 31.41, 57.23) * 2 - 1;
        wx = cx + wX * warp;
        wy = cy + wY * warp;
      }

      // Compute dispNoise per UE formulas
      let noise = 0.5;
      if (isClump) {
        const cbx = Math.floor(wx / clusterSp);
        const cby = Math.floor(wy / clusterSp);
        let minD2 = 1e18;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const ix = cbx + dx, iy = cby + dy;
            const h  = ueHash(ueHash(ix + 32768, iy + 32768), sp);
            const jx = ueFRand(h)     - 0.5;
            const jy = ueFRand(h ^ 1) - 0.5;
            const ccx = (ix + jx) * clusterSp;
            const ccy = (iy + jy) * clusterSp;
            const dxc = wx - ccx, dyc = wy - ccy;
            const d2  = dxc * dxc + dyc * dyc;
            if (d2 < minD2) minD2 = d2;
          }
        }
        const e = Math.sqrt(minD2) / Math.max(sigma, 0.001);
        noise = Math.exp(-0.5 * e * e);

      } else if (isRand) {
        const ix = Math.floor(wx / randCell);
        const iy = Math.floor(wy / randCell);
        noise = ueFRand(ueHash(ueHash(ix + 32768, iy + 32768), sp));

      } else if (isUni) {
        const cbx = Math.floor(wx / uniGrid);
        const cby = Math.floor(wy / uniGrid);
        let minD2 = 1e18;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const ix = cbx + dx, iy = cby + dy;
            const h  = ueHash(ueHash(ix + 32768, iy + 32768), sp);
            const jx = (ueFRand(h)     - 0.5) * jitterAmt;
            const jy = (ueFRand(h ^ 1) - 0.5) * jitterAmt;
            const ccx = (ix + 0.5 + jx) * uniGrid;
            const ccy = (iy + 0.5 + jy) * uniGrid;
            const dxc = wx - ccx, dyc = wy - ccy;
            const d2  = dxc * dxc + dyc * dyc;
            if (d2 < minD2) minD2 = d2;
          }
        }
        const t = Math.min(1, Math.max(0, 1 - Math.sqrt(minD2) / Math.max(radius, 0.001)));
        noise   = Math.pow(t, sharpness);
      }

      const r = ueFRand(ueHash(ueHash(xi + 1024, yi + 1024), sp));
      cands[ci++] = cx / G;
      cands[ci++] = cy / G;
      cands[ci++] = noise - r;
    }
  }

  // Pack into objects, sort by score desc, keep top N
  const triples = [];
  for (let i = 0; i < ci; i += 3) triples.push([cands[i], cands[i + 1], cands[i + 2]]);
  triples.sort((a, b) => b[2] - a[2]);
  return triples.slice(0, N).map(t => [t[0], t[1]]);
}

// Render dispersion preview for all rows that have at least one selected cell.
// One pattern per row, distinct color per row.
function renderDispersionForSelection() {
  const section = document.getElementById('dispersion-section');
  if (!gridApi) { section.style.display = 'none'; dispCurrentRowIds = []; return; }
  if (tableType === 'ecosystem') { renderNoiseForSelection(); return; }
  if (tableType !== 'species') { section.style.display = 'none'; dispCurrentRowIds = []; return; }
  document.getElementById('dispersion-section-title').textContent = 'Dispersion Pattern';

  // Unique row ids from current selection, preserving insertion order
  const seen = new Set();
  const rowIds = [];
  selectedCells.forEach(k => {
    const id = k.split('||')[0];
    if (!seen.has(id)) { seen.add(id); rowIds.push(id); }
  });

  const nodes = rowIds.map(id => gridApi.getRowNode(id)).filter(Boolean);
  if (nodes.length === 0) {
    section.style.display = 'none';
    dispCurrentRowIds = [];
    return;
  }

  dispCurrentRowIds = nodes.map(n => n.id);
  section.style.display = '';

  const canvas = document.getElementById('dispersion-canvas');
  const w = canvas.parentElement.clientWidth - 24;
  canvas.width  = w;
  canvas.height = w;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, w);

  // Background + grid + border
  ctx.fillStyle = '#0a1422';
  ctx.fillRect(0, 0, w, w);
  ctx.strokeStyle = '#1a2a45';
  ctx.lineWidth = 1;
  for (let i = 1; i < 8; i++) {
    const p = (i / 8) * w;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, w); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
  }
  ctx.strokeStyle = '#3a5a90';
  ctx.strokeRect(0.5, 0.5, w - 1, w - 1);

  // Real-world density: N per pattern = stems/ha × area in ha.
  // Capped per pattern so very large grids stay performant and visually parseable.
  const MAX_PTS_PER_PATTERN = 3000;
  const areaHa = (dispGridSizeM * dispGridSizeM) / 10000;
  const n      = nodes.length;
  const alpha  = n === 1 ? 1.0 : n <= 3 ? 0.72 : n <= 6 ? 0.55 : 0.42;

  // Dot size = approximate tree canopy in real meters (≈1.5 m radius),
  // clamped so it stays legible at extreme zooms.
  const treeRadiusM = 1.5;
  const dotR = Math.max(0.7, Math.min(7, (treeRadiusM / dispGridSizeM) * w));

  const infoLines = [];
  ctx.globalAlpha = alpha;
  nodes.forEach((node, idx) => {
    const d          = node.data;
    const type       = d.DispersionType || 'Random';
    const targetR    = parseFloat(d.TargetRIndex)            || 0;
    const scale      = parseFloat(d.DispersionScale)         || 0;
    const warp       = parseFloat(d.DispersionWarpStrength)  || 0;
    const seed       = parseInt  (d.DispersionSeed, 10)      || 0;
    const stemsPerHa = parseFloat(d.StemsPerHectare)         || 0;
    const color      = PATTERN_COLORS[idx % PATTERN_COLORS.length];

    const realN = Math.max(0, Math.round(stemsPerHa * areaHa));
    const N     = Math.min(MAX_PTS_PER_PATTERN, realN);
    const subsampled = realN > N;

    const pts = generateDispersionPoints(type, targetR, scale, warp, seed, N, dispGridSizeM);

    ctx.fillStyle = color;
    pts.forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x * w, y * w, dotR, 0, Math.PI * 2);
      ctx.fill();
    });

    if (n === 1) {
      const actualR = pts.length >= 2 ? clarkEvansR(pts).toFixed(3) : '–';
      const subnote = subsampled ? ` <span style="color:#a07050">(of ${realN.toLocaleString()})</span>` : '';
      infoLines.push(
        `<span style="color:${color}">${esc(type)}</span>` +
        `  ·  R<sub>target</sub>=${targetR.toFixed(2)}` +
        `  ·  R<sub>actual</sub>=${actualR}` +
        `<br><span style="color:#7a9abf">${stemsPerHa.toLocaleString()} stems/ha · ${areaHa.toFixed(areaHa < 1 ? 3 : 2)} ha · n=${N.toLocaleString()}${subnote}</span>` +
        `<br><span style="color:#5a7090">scale ${scale.toFixed(2)} · warp ${warp.toFixed(2)} · seed ${seed}</span>`
      );
    } else {
      const sub = subsampled ? `${N.toLocaleString()}/${realN.toLocaleString()}` : N.toLocaleString();
      infoLines.push(
        `<span style="display:inline-block;width:9px;height:9px;background:${color};border-radius:50%;vertical-align:middle;margin-right:6px"></span>` +
        `<span style="color:${color}">${esc(node.data._key)}</span>` +
        `<span style="color:#7a9abf"> · ${esc(type)} · ${stemsPerHa.toLocaleString()} stems/ha · n=${sub}</span>`
      );
    }
  });
  ctx.globalAlpha = 1.0;

  // Scale reference overlays
  drawHouseIcon(ctx, w, dispGridSizeM);
  drawScaleBar(ctx, w, dispGridSizeM);

  document.getElementById('dispersion-info').innerHTML = infoLines.join('<br>');
}

// Render spatial noise heatmap for all selected ecosystem rows.
function renderNoiseForSelection() {
  const section = document.getElementById('dispersion-section');
  document.getElementById('dispersion-section-title').textContent = 'Spatial Noise';

  const seen = new Set(), rowIds = [];
  selectedCells.forEach(k => {
    const id = k.split('||')[0];
    if (!seen.has(id)) { seen.add(id); rowIds.push(id); }
  });
  const nodes = rowIds.map(id => gridApi.getRowNode(id)).filter(Boolean);
  if (nodes.length === 0) { section.style.display = 'none'; dispCurrentRowIds = []; return; }

  dispCurrentRowIds = nodes.map(n => n.id);
  section.style.display = '';

  const canvas = document.getElementById('dispersion-canvas');
  const w = canvas.parentElement.clientWidth - 24;
  canvas.width = w; canvas.height = w;
  const ctx = canvas.getContext('2d');

  const imgData = ctx.createImageData(w, w);
  const px = imgData.data;

  // Background fill (#0a1422)
  for (let i = 0; i < px.length; i += 4) { px[i] = 10; px[i+1] = 20; px[i+2] = 34; px[i+3] = 255; }

  const n     = nodes.length;
  const alpha = n === 1 ? 1.0 : n <= 3 ? 0.72 : n <= 6 ? 0.55 : 0.42;

  // Pre-parse each row's noise params
  const layers = nodes.map((node) => {
    const noiseSize = Math.max(1, parseFloat(node.data.SpatialNoiseSize) || 1000);
    const strength  = Math.max(0.1, parseFloat(node.data.SpatialNoiseStrength) || 2.0);
    const seed      = parseInt(node.data.SpatialNoiseSeed, 10) || 0;
    const hex       = PATTERN_COLORS[node.rowIndex % PATTERN_COLORS.length];
    const cr = parseInt(hex.slice(1,3), 16);
    const cg = parseInt(hex.slice(3,5), 16);
    const cb = parseInt(hex.slice(5,7), 16);
    const freq = dispGridSizeM / noiseSize;
    return { sample: makeValueNoise(seed), freq, strength, cr, cg, cb };
  });

  // Render pixel rows. Step by 2 for performance, fill 2×2 blocks.
  const step = w > 300 ? 2 : 1;
  for (let py = 0; py < w; py += step) {
    for (let qx = 0; qx < w; qx += step) {
      const u = qx / w, v = py / w;
      let r = 10, g = 20, b = 34;
      layers.forEach(({ sample, freq, strength, cr, cg, cb }) => {
        const raw     = sample(u * freq, v * freq);           // 0..1
        const density = Math.max(0, Math.min(1, 0.5 + (raw - 0.5) * strength));
        r += cr * density * alpha;
        g += cg * density * alpha;
        b += cb * density * alpha;
      });
      const R = Math.min(255, r | 0), G = Math.min(255, g | 0), B = Math.min(255, b | 0);
      for (let dy = 0; dy < step && py + dy < w; dy++) {
        for (let dx = 0; dx < step && qx + dx < w; dx++) {
          const i = ((py + dy) * w + (qx + dx)) * 4;
          px[i] = R; px[i+1] = G; px[i+2] = B; px[i+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Grid lines overlay
  ctx.strokeStyle = 'rgba(26,42,69,0.5)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 8; i++) {
    const p = (i / 8) * w;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, w); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
  }
  ctx.strokeStyle = '#3a5a90'; ctx.strokeRect(0.5, 0.5, w - 1, w - 1);

  drawHouseIcon(ctx, w, dispGridSizeM);
  drawScaleBar(ctx, w, dispGridSizeM);

  const infoLines = [];
  nodes.forEach((node) => {
    const hex      = PATTERN_COLORS[node.rowIndex % PATTERN_COLORS.length];
    const noiseSize = parseFloat(node.data.SpatialNoiseSize) || 1000;
    const strength  = parseFloat(node.data.SpatialNoiseStrength) || 2.0;
    const seed      = parseInt(node.data.SpatialNoiseSeed, 10) || 0;
    if (n === 1) {
      infoLines.push(
        `<span style="color:${hex}">${esc(node.data._key)}</span>` +
        `<br><span style="color:#7a9abf">noise size ${noiseSize.toLocaleString()} m · strength ${strength.toFixed(2)} · seed ${seed}</span>`
      );
    } else {
      infoLines.push(
        `<span style="display:inline-block;width:9px;height:9px;background:${hex};border-radius:50%;vertical-align:middle;margin-right:6px"></span>` +
        `<span style="color:${hex}">${esc(node.data._key)}</span>` +
        `<span style="color:#7a9abf"> · ${noiseSize.toLocaleString()} m · str ${strength.toFixed(2)}</span>`
      );
    }
  });
  document.getElementById('dispersion-info').innerHTML = infoLines.join('<br>');
}

// Re-render after edits — selection drives what we draw, so just re-run.
function refreshDispersionIfActive() {
  if (dispCurrentRowIds.length === 0) return;
  renderDispersionForSelection();
}

const DISPERSION_FIELDS = new Set([
  'DispersionType', 'TargetRIndex', 'DispersionScale',
  'DispersionWarpStrength', 'DispersionSeed', 'StemsPerHectare'
]);
const NOISE_FIELDS = new Set([
  'SpatialNoiseSize', 'SpatialNoiseStrength', 'SpatialNoiseSeed'
]);

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const setStatus = msg => { document.getElementById('status-msg').textContent = msg; };

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});
</script>
